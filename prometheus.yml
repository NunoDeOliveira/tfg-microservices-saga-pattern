#### prometheus service

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'production-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ["172.17.0.1:8081"]

  - job_name: 'delivery-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ["172.17.0.1:8082"]

  - job_name: 'inventory-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ["172.17.0.1:8083"]


