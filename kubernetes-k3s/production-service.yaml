apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-service
  labels:
    app: production-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: production-service
  template:
    metadata:
      labels:
        app: production-service
    spec:
      containers:
      - name: production-service
        image: nunohenriquedeoliveira/production-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-production:5432/productiondb"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "postgres"
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq"
        - name: SPRING_RABBITMQ_PORT
          value: "5672"
        - name: SPRING_RABBITMQ_USERNAME
          value: "nuno"
        - name: SPRING_RABBITMQ_PASSWORD
          value: "rabbit"
        - name: SERVER_PORT
          value: "8081"
---
apiVersion: v1
kind: Service
metadata:
  name: production-service
spec:
  selector:
    app: production-service
  ports:
    - port: 8081
      targetPort: 8081
